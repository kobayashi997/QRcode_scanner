<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>QR Scanner for GAS</title>
    <!-- jsQRライブラリの読み込み -->
    <script src="https://jsdelivr.net"></script>
    <style>
      body { margin: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; }
      #canvas { width: 100%; height: 100%; object-fit: cover; }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <script>
      const canvasElement = document.getElementById("canvas");
      const canvas = canvasElement.getContext("2d", { willReadFrequently: true });
      const video = document.createElement("video");
      let isScanning = true;

      // カメラの起動
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
        video.srcObject = stream;
        video.setAttribute("playsinline", true); 
        video.play();
        requestAnimationFrame(tick);
      }).catch(function(err) {
        console.error("Camera error:", err);
      });

      function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
          canvasElement.height = video.videoHeight;
          canvasElement.width = video.videoWidth;
          canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
          
          const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
          
          if (code && code.data) {
            isScanning = false;
            
            // 💡 読み取ったデータを親フレーム（GAS側）に送信する
            // * を指定することでクロスドメイン間でも確実に通信可能にします
            window.parent.postMessage(code.data, "*");
          }
        }
        if (isScanning) {
          requestAnimationFrame(tick);
        }
      }
    </script>
  </body>
</html>
