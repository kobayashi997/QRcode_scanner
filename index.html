<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <!-- GitHub(jsQR)からスキャナライブラリを読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <style>
      :root { --wood: #5d4037; --paper: #fdfaf1; --gold: #c5a059; }
      body {
        margin: 0; background-color: #2c1e1a; font-family: 'Sawarabi Mincho', serif;
        display: flex; justify-content: center; align-items: center; height: 100vh;
      }
      .container {
        background: var(--paper); width: 90%; max-width: 450px; padding: 40px 20px;
        border-radius: 15px; border: 3px solid var(--gold); text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      }
      h1 { color: var(--wood); letter-spacing: 5px; margin-bottom: 5px; }
      .scanner-frame {
        position: relative; width: 100%; max-width: 300px; margin: 20px auto;
        border: 10px solid #fff; outline: 1px solid var(--gold); overflow: hidden;
      }
      #canvas { width: 100%; height: auto; display: block; }
      .laser {
        position: absolute; top: 0; left: 0; width: 100%; height: 2px;
        background: rgba(197, 160, 89, 0.8); box-shadow: 0 0 10px var(--gold);
        animation: scan 2s infinite linear;
      }
      @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
      #status { margin-top: 20px; color: var(--wood); font-weight: bold; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>図書室の扉</h1>
      <p style="color: #8d6e63;">QRコードをかざしてください</p>
      
      <div class="scanner-frame">
        <canvas id="canvas"></canvas>
        <div class="laser"></div>
      </div>

      <div id="status">カメラを起動しています...</div>
    </div>

    <script>
      const video = document.createElement("video");
      const canvasElement = document.getElementById("canvas");
      const canvas = canvasElement.getContext("2d");
      let isScanning = true;

      // カメラの開始
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.play();
        requestAnimationFrame(tick);
      });

      function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
          document.getElementById("status").innerText = "スキャン中...";
          canvasElement.height = video.videoHeight;
          canvasElement.width = video.videoWidth;
          canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
          
          const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
          // GitHubから読み込んだjsQRを使用
          const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
          
          if (code && code.data) {
            isScanning = false;
            document.getElementById("status").innerText = "照合しています...";
            // GAS側の関数を実行
            google.script.run.withSuccessHandler(onResult).checkEntry(code.data);
          }
        }
        requestAnimationFrame(tick);
      }

      function onResult(response) {
        if (response.success) {
          if (response.type === "STUDENT") {
            window.top.location.href = "<?= deployURL ?>?p=Top&sid=" + response.sid;
          } else if (response.type === "ADMIN") {
            const pass = prompt(response.name + "さん、合言葉を入力してください");
            if (pass === response.correctPass) {
              window.top.location.href = "<?= deployURL ?>?p=" + response.role;
            } else {
              alert("合言葉が違います");
              isScanning = true;
            }
          }
        } else {
          alert("登録されていないコードです");
          isScanning = true;
        }
      }
    </script>
  </body>
</html>
